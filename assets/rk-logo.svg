<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>RK</title>
  <!-- The brand's choreography, matching the web app:
       Act 1 — the strokes arrive out of deep space: the whole mark settles
       in from a distance while each stroke drifts to its place, and the
       trajectory streaks in last along its own direction of travel.
       Act 2 — the formed mark makes one full 360° revolution
       (0.9s, matching cubic-bezier(.45,.05,.25,1)); on the web this fires
       on hover, here it replays on a 6s timer. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="95%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#03040A"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- spin wrapper: one revolution once the letters have formed -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 32 32; 0 32 32; 360 32 32; 360 32 32"
      keyTimes="0; 0.3; 0.45; 1"
      calcMode="spline" keySplines="0 0 1 1; .45 .05 .25 1; 0 0 1 1"
      dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.96;1"
      dur="6s" repeatCount="indefinite"/>

    <!-- depth settle: the mark approaches from far space -->
    <g transform="translate(32 32)">
      <g>
        <animateTransform attributeName="transform" type="scale"
          values="2.1;1;1" keyTimes="0;0.2;1"
          calcMode="spline" keySplines=".2 .7 .2 1; 0 0 1 1"
          dur="6s" repeatCount="indefinite"/>
        <g transform="translate(-33.6 -32)">

          <g stroke="#F2F4F8" stroke-width="5" stroke-linecap="butt">
            <g><animateTransform attributeName="transform" type="translate" values="-30 8; 0 0; 0 0" keyTimes="0;0.14;1" calcMode="spline" keySplines=".2 .7 .2 1;0 0 1 1" dur="6s" repeatCount="indefinite"/>
              <path d="M13.5 50V14"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.12;1" dur="6s" repeatCount="indefinite"/></path></g>
            <g><animateTransform attributeName="transform" type="translate" values="-12 -26; 0 0; 0 0" keyTimes="0;0.17;1" calcMode="spline" keySplines=".2 .7 .2 1;0 0 1 1" dur="6s" repeatCount="indefinite"/>
              <path d="M13.5 14h8.5a9 9 0 0 1 0 18h-8.5"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.03;0.15;1" dur="6s" repeatCount="indefinite"/></path></g>
            <g><animateTransform attributeName="transform" type="translate" values="-6 30; 0 0; 0 0" keyTimes="0;0.2;1" calcMode="spline" keySplines=".2 .7 .2 1;0 0 1 1" dur="6s" repeatCount="indefinite"/>
              <path d="M21 32l10.5 18"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.06;0.18;1" dur="6s" repeatCount="indefinite"/></path></g>
            <g><animateTransform attributeName="transform" type="translate" values="16 -30; 0 0; 0 0" keyTimes="0;0.22;1" calcMode="spline" keySplines=".2 .7 .2 1;0 0 1 1" dur="6s" repeatCount="indefinite"/>
              <path d="M38.5 50V14"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.2;1" dur="6s" repeatCount="indefinite"/></path></g>
            <g><animateTransform attributeName="transform" type="translate" values="24 24; 0 0; 0 0" keyTimes="0;0.24;1" calcMode="spline" keySplines=".2 .7 .2 1;0 0 1 1" dur="6s" repeatCount="indefinite"/>
              <path d="M38.5 33.5L52 50"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.22;1" dur="6s" repeatCount="indefinite"/></path></g>
          </g>

          <!-- the trajectory streaks in last, along its own line of travel -->
          <g><animateTransform attributeName="transform" type="translate" values="30 -26; 0 0; 0 0" keyTimes="0;0.28;1" calcMode="spline" keySplines=".2 .7 .2 1;0 0 1 1" dur="6s" repeatCount="indefinite"/>
            <path d="M36.4 35.8
                     C 42.5 29.5, 48.5 22.5, 58 11.4
                     C 54 23, 47.5 30.5, 40.6 39.4 Z" fill="#F2F4F8">
              <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.16;0.27;1" dur="6s" repeatCount="indefinite"/></path></g>

        </g>
      </g>
    </g>
  </g>
</svg>
