<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="square">
  <title>RK monogram with orbiting node</title>
  <!-- static ring -->
  <circle cx="32" cy="32" r="28" stroke="#7DE2FF" stroke-width="1" opacity=".28"/>

  <!-- inclined orbit, slowly revolving -->
  <ellipse cx="32" cy="32" rx="28" ry="11" stroke="#7DE2FF" stroke-width="1" opacity=".18" transform="rotate(-28 32 32)">
    <animateTransform attributeName="transform" type="rotate"
      from="-28 32 32" to="332 32 32" dur="24s" repeatCount="indefinite"/>
  </ellipse>

  <!-- RK monogram -->
  <g stroke="#7DE2FF" stroke-width="2.6">
    <path d="M20 44V20h9a7 7 0 0 1 0 14h-9"/>
    <path d="M29 34l8 10"/>
    <path d="M44 20v24"/>
    <path d="M44 32l9-12"/>
    <path d="M44 32l9 12"/>
  </g>

  <!-- node riding the ring -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 32 32" to="360 32 32" dur="9s" repeatCount="indefinite"/>
    <circle cx="60" cy="32" r="2.6" fill="#7DE2FF">
      <animate attributeName="opacity" values="1;.45;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
